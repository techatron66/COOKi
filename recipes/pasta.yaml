# ─────────────────────────────────────────────────────────────────────────────
# COOKi OS — One-Pot Pasta  (example recipe)
#
# model_type field:
#   "yolo"       → trained with  yolo_integration.py  (image folders, simpler)
#   "regression" → trained with  trainer.py            (live camera + slider)
#
# The model_type is also auto-detected from the filename:
#   *_yolo.pt  →  yolo backend
#   *.pt       →  regression backend
#
# Motor profiles for reference:
#   Gentle fold   speed: 80   stir_s: 3   rest_s: 9    (garlic, eggs)
#   Stir-reduce   speed: 150  stir_s: 5   rest_s: 5    (sauces, pastes)
#   Micro-pulse   speed: 110  stir_s: 6   rest_s: 30   (long simmers)
#   Aggressive    speed: 220  stir_s: 5   rest_s: 3    (thick sauces)
# ─────────────────────────────────────────────────────────────────────────────

recipe: one_pot_pasta

nodes:

  # ── 1. Heat the pan ─────────────────────────────────────────────────────────
  - id: heat_pan
    type: TIMED
    prompt: "Place pan on medium heat and add a generous glug of olive oil."
    duration_s: 90
    motor:
      speed: 0
      direction: 0
      stir_s: 90
      rest_s: 0

  # ── 2. Golden garlic (YOLO — train from phone photos) ────────────────────────
  - id: garlic_golden
    type: VISION
    prompt: "Add thinly sliced garlic and a pinch of chilli flakes to the oil."
    model: models/garlic_golden_yolo.pt
    model_type: yolo
    exit_threshold: 0.80       # exit when model says ≥80% cooked
    frame_votes: 5             # 5 consecutive agreeing frames required
    fallback_s: 240            # hard stop after 4 min if vision never fires
    motor:
      speed: 80
      direction: 1
      stir_s: 3                # stir 3s
      rest_s: 9                # rest 9s (vision runs during rest)

  # ── 3. Golden onion (YOLO — train from phone photos) ────────────────────────
  - id: onion_golden
    type: VISION
    prompt: "Add thinly sliced onion to the pan with the garlic."
    model: models/onion_golden_yolo.pt
    model_type: yolo
    exit_threshold: 0.82       # onions take longer — wait for proper gold
    frame_votes: 5
    fallback_s: 420            # 7 min — onions need time, don't rush them
    motor:
      speed: 90
      direction: 1
      stir_s: 4                # slightly longer stir than garlic
      rest_s: 8

  # ── 4. Veggies soften ────────────────────────────────────────────────────────
  - id: veggies_soften
    type: VISION
    prompt: "Add your chopped vegetables (peppers, courgette, spinach etc.)."
    model: models/veggies_soften_yolo.pt
    model_type: yolo
    exit_threshold: 0.78       # soften, not mush — exit a touch earlier
    frame_votes: 6
    fallback_s: 360            # 6 min fallback
    motor:
      speed: 110
      direction: 1
      stir_s: 5
      rest_s: 7

  # ── 6. Tomato paste reduction (regression — live-trained) ────────────────────
  - id: tomato_paste_reduced
    type: VISION
    prompt: "Add 2 tbsp tomato paste directly into the garlicky oil."
    model: models/tomato_paste_reduced.pt
    model_type: regression
    exit_threshold: 0.85
    frame_votes: 6
    fallback_s: 360
    motor:
      speed: 150
      direction: 1
      stir_s: 5
      rest_s: 5

  # ── 7. Add pasta + water ──────────────────────────────────────────────────────
  - id: pasta_and_water
    type: TIMED
    prompt: "Add 200g dry pasta and 600ml water. Ensure pasta is fully submerged."
    duration_s: 60
    motor:
      speed: 110
      direction: 1
      stir_s: 6
      rest_s: 4

  # ── 8. Cook pasta (YOLO — train from photos at different stages) ──────────────
  - id: pasta_cook
    type: VISION
    prompt: "Pasta is cooking. COOKi will stir in intervals and monitor doneness."
    model: models/pasta_done_yolo.pt
    model_type: yolo
    exit_threshold: 0.88
    frame_votes: 8
    fallback_s: 720            # 12 min hard fallback
    motor:
      speed: 110
      direction: 1
      stir_s: 6
      rest_s: 30               # long rest — pasta needs time between stirs

  # ── 9. Rest off heat ──────────────────────────────────────────────────────────
  - id: rest
    type: TIMED
    prompt: "Turn off the heat. COOKi will rest the pasta for 2 minutes."
    duration_s: 120
    motor:
      speed: 0
      direction: 0
      stir_s: 120
      rest_s: 0
